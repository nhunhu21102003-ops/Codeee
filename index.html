<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qank&Lucy Notes - Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Dancing+Script:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,700&family=Space+Mono&family=Montserrat:wght@400;800&family=Pacifico&family=Bitter:wght@400;700&family=Lora:ital,wght@0,400;1,700&family=Oswald:wght@300;600&family=Roboto+Slab:wght@300;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-bg: #f8fafc;
            --accent-color: #10b981;
            --font-global: 'Quicksand', sans-serif;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: var(--font-global);
            background-color: var(--primary-bg);
            transition: background 0.5s ease;
        }

        /* Background Layers */
        .bg-layer { position: fixed; inset: 0; pointer-events: none; z-index: 0; display: none; overflow: hidden; }
        .floating-emoji { position: absolute; pointer-events: none; animation: floatUp 8s infinite linear; opacity: 0.3; }
        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            20% { opacity: 0.4; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Canvas & Viewport */
        #canvas-viewport { 
            width: 100vw; height: 100vh; 
            cursor: grab; overflow: hidden; 
            position: relative; z-index: 1; 
            background-image: radial-gradient(rgba(0,0,0,0.06) 1.5px, transparent 1.5px);
            background-size: 40px 40px;
        }
        #canvas-viewport:active { cursor: grabbing; }
        #canvas-content { 
            position: absolute; top: 0; left: 0; 
            transform-origin: 0 0; will-change: transform; 
            width: 8000px; height: 8000px;
        }

        /* Resizable Note Cards */
        .note-card {
            position: absolute; 
            min-width: 220px; min-height: 160px;
            background: white; border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(8px); border: 2px solid transparent;
            display: flex; flex-direction: column;
            overflow: hidden;
            z-index: 10;
        }
        .note-header { 
            cursor: move; padding: 0.8rem 1rem; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid rgba(0,0,0,0.05);
            background: rgba(0,0,0,0.02);
            user-select: none;
        }
        .note-body { padding: 1.2rem; flex-grow: 1; overflow-y: auto; pointer-events: auto; }
        
        /* Resizer handle custom */
        .resizer {
            width: 15px; height: 15px;
            background: rgba(0,0,0,0.1);
            position: absolute; right: 0; bottom: 0;
            cursor: nwse-resize;
            border-radius: 5px 0 0 0;
        }

        /* Note Themes */
        .theme-mint { background-color: #f0fdf4; border-color: #86efac; color: #064e3b; }
        .theme-pink { background-color: #fff1f2; border-color: #f9a8d4; color: #831843; }
        .theme-lavender { background-color: #f5f3ff; border-color: #c4b5fd; color: #4c1d95; }
        .theme-sky { background-color: #f0f9ff; border-color: #7dd3fc; color: #0c4a6e; }
        .theme-sunset { background-color: #fff7ed; border-color: #fdba74; color: #7c2d12; }
        .theme-charcoal { background-color: #1f2937; border-color: #4b5563; color: #f9fafb; }

        /* Auth UI */
        #auth-container {
            position: fixed; inset: 0; z-index: 9999;
            background: linear-gradient(135deg, #f0fdf4 0%, #e0f2fe 100%);
            display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: white; padding: 3rem; border-radius: 3rem;
            width: 100%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
            transition: all 0.4s ease;
        }
        .auth-hidden { opacity: 0; pointer-events: none; transform: translateY(20px); visibility: hidden; position: absolute; }

        /* Zoom & Sidebar */
        #zoom-control {
            position: fixed; bottom: 2rem; right: 2rem;
            background: rgba(255,255,255,0.9); padding: 0.8rem 1.2rem;
            border-radius: 2rem; z-index: 1000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            display: flex; align-items: center; gap: 0.8rem; backdrop-filter: blur(10px);
        }
        .sidebar { 
            position: fixed; top: 1rem; left: 1rem; 
            background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(20px); padding: 1.5rem; 
            border-radius: 2.5rem; z-index: 2000; 
            width: 310px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar.collapsed { transform: translateX(-350px); }
        #toggle-sidebar { 
            position: fixed; top: 1.5rem; left: 1.5rem; 
            z-index: 1500; width: 50px; height: 50px; 
            background: white; border-radius: 18px; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.06); cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Background Layers for Themes -->
    <div id="hearts-layer" class="bg-layer"></div>
    <div id="stars-layer" class="bg-layer" style="background: #0f172a;"></div>
    <div id="football-layer" class="bg-layer"></div>

    <!-- Auth System -->
    <div id="auth-container">
        <div id="signin-card" class="auth-card">
            <h2 class="text-3xl font-black text-gray-800 mb-2">Chào mừng!</h2>
            <p class="text-gray-400 mb-8 text-sm italic">Ghi chú mọi khoảnh khắc của Qank & Lucy</p>
            <div class="space-y-4">
                <input type="text" id="login-email" placeholder="Email hoặc Tên" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border-2 border-transparent focus:border-emerald-200 transition-all">
                <input type="password" placeholder="Mật khẩu" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border-2 border-transparent focus:border-emerald-200 transition-all">
                <button onclick="handleAuth('login')" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-emerald-700 transition-all">Đăng Nhập</button>
                <p class="text-center text-xs text-gray-500">Chưa có tài khoản? <button onclick="switchAuth('signup')" class="text-emerald-600 font-bold">Đăng ký</button></p>
            </div>
        </div>

        <div id="signup-card" class="auth-card auth-hidden">
            <h2 class="text-3xl font-black text-gray-800 mb-2">Đăng ký</h2>
            <p class="text-gray-400 mb-8 text-sm italic">Bắt đầu không gian sáng tạo mới</p>
            <div class="space-y-4">
                <input type="text" id="signup-name" placeholder="Tên của bạn" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border-2 border-transparent focus:border-emerald-200 transition-all">
                <input type="email" placeholder="Email" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border-2 border-transparent focus:border-emerald-200 transition-all">
                <input type="password" placeholder="Mật khẩu" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border-2 border-transparent focus:border-emerald-200 transition-all">
                <button onclick="handleAuth('signup')" class="w-full bg-emerald-900 text-white py-4 rounded-2xl font-bold shadow-lg transition-all">Tạo Tài Khoản</button>
                <p class="text-center text-xs text-gray-500">Đã có tài khoản? <button onclick="switchAuth('signin')" class="text-emerald-600 font-bold">Quay lại đăng nhập</button></p>
            </div>
        </div>
    </div>

    <!-- Toggle Sidebar -->
    <div id="toggle-sidebar" class="hidden" onclick="toggleSidebar()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar collapsed" id="app-sidebar">
        <div class="flex items-center justify-between mb-8 pb-4 border-b">
            <div class="flex items-center gap-3">
                <div id="user-avatar" class="w-11 h-11 bg-emerald-500 rounded-xl flex items-center justify-center font-bold text-white shadow-inner">Q</div>
                <div>
                    <p id="user-name-display" class="font-black text-gray-800 text-sm">Qank</p>
                    <span class="text-[9px] text-emerald-500 font-bold uppercase tracking-widest">Premium Canvas</span>
                </div>
            </div>
            <button onclick="toggleSidebar()" class="p-2 hover:bg-gray-100 rounded-xl transition-all">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
            </button>
        </div>

        <div class="space-y-6">
            <button onclick="openModal()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black text-base shadow-xl hover:translate-y-[-2px] transition-all">
                + Ghi Chú Mới
            </button>

            <div class="p-4 bg-gray-50 rounded-3xl space-y-4">
                <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Canvas Themes</label>
                <div class="grid grid-cols-4 gap-3">
                    <button onclick="changeCanvasTheme('default')" class="aspect-square rounded-xl bg-white border border-gray-200 flex items-center justify-center text-lg hover:scale-105 transition-all">🌿</button>
                    <button onclick="changeCanvasTheme('pink')" class="aspect-square rounded-xl bg-pink-50 border border-pink-200 flex items-center justify-center text-lg hover:scale-105 transition-all">💖</button>
                    <button onclick="changeCanvasTheme('stars')" class="aspect-square rounded-xl bg-slate-900 flex items-center justify-center text-lg hover:scale-105 transition-all">✨</button>
                    <button onclick="changeCanvasTheme('football')" class="aspect-square rounded-xl bg-green-100 border border-green-200 flex items-center justify-center text-lg hover:scale-105 transition-all">⚽</button>
                </div>
            </div>

            <div class="p-4 bg-gray-50 rounded-3xl space-y-4">
                <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Cấu hình hiển thị</label>
                <div class="flex items-center justify-between text-xs font-bold">
                    <span>Lưới tọa độ</span>
                    <input type="checkbox" checked onchange="toggleGrid(this)" class="accent-emerald-600 w-4 h-4">
                </div>
            </div>

            <button onclick="resetView()" class="w-full py-2 text-gray-400 font-bold text-xs hover:text-emerald-600 transition-all underline underline-offset-4">Căn giữa không gian</button>
        </div>
    </aside>

    <!-- Zoom Control -->
    <div id="zoom-control">
        <button onclick="zoomStep(-0.1)" class="w-8 h-8 flex items-center justify-center bg-gray-100 rounded-full font-bold">-</button>
        <input type="range" id="zoom-slider" min="0.1" max="2.5" step="0.01" value="0.8" class="w-24 accent-emerald-500" oninput="handleZoomSlider(this.value)">
        <button onclick="zoomStep(0.1)" class="w-8 h-8 flex items-center justify-center bg-gray-100 rounded-full font-bold">+</button>
        <div id="zoom-percent" class="px-2 text-[10px] font-black text-emerald-600">80%</div>
    </div>

    <!-- Canvas -->
    <div id="canvas-viewport">
        <div id="canvas-content"></div>
    </div>

    <!-- Modal: Create Note -->
    <div id="note-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[9000] hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-[2.5rem] w-full max-w-3xl p-8 shadow-2xl relative">
            <h2 class="text-2xl font-black mb-6 text-gray-800">Tạo Ghi Chú Mới</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-5">
                    <div>
                        <label class="text-[9px] font-black text-gray-400 block mb-2 uppercase tracking-widest">Màu thẻ</label>
                        <div class="flex flex-wrap gap-3" id="theme-picker">
                            <button onclick="selectTheme('mint')" class="w-8 h-8 rounded-full bg-emerald-200 border-2 border-white shadow-md transition-all active-theme scale-125" data-theme="mint"></button>
                            <button onclick="selectTheme('pink')" class="w-8 h-8 rounded-full bg-pink-200 border-2 border-white shadow-md transition-all" data-theme="pink"></button>
                            <button onclick="selectTheme('lavender')" class="w-8 h-8 rounded-full bg-indigo-200 border-2 border-white shadow-md transition-all" data-theme="lavender"></button>
                            <button onclick="selectTheme('sky')" class="w-8 h-8 rounded-full bg-sky-200 border-2 border-white shadow-md transition-all" data-theme="sky"></button>
                            <button onclick="selectTheme('sunset')" class="w-8 h-8 rounded-full bg-orange-200 border-2 border-white shadow-md transition-all" data-theme="sunset"></button>
                            <button onclick="selectTheme('charcoal')" class="w-8 h-8 rounded-full bg-gray-800 border-2 border-white shadow-md transition-all" data-theme="charcoal"></button>
                        </div>
                    </div>
                    <div>
                        <label class="text-[9px] font-black text-gray-400 block mb-2 uppercase tracking-widest">Font chữ</label>
                        <select id="font-select" class="w-full p-3 bg-gray-50 rounded-xl font-bold text-sm outline-none border-2 border-transparent focus:border-emerald-200">
                            <option value="'Quicksand', sans-serif">Quicksand (Tròn)</option>
                            <option value="'Caveat', cursive">Caveat (Viết tay)</option>
                            <option value="'Montserrat', sans-serif">Montserrat (Thẳng)</option>
                            <option value="'Playfair Display', serif">Playfair (Cổ điển)</option>
                            <option value="'Space Mono', monospace">Terminal (Code)</option>
                        </select>
                    </div>
                </div>
                <div class="space-y-4">
                    <input type="text" id="note-title" placeholder="Tiêu đề..." class="w-full p-4 bg-gray-50 rounded-xl outline-none font-black text-xl border-2 border-transparent focus:border-emerald-100 transition-all">
                    <textarea id="note-body" placeholder="Nội dung ý tưởng..." class="w-full p-4 bg-gray-50 rounded-2xl outline-none h-40 font-medium border-2 border-transparent focus:border-emerald-100 transition-all"></textarea>
                </div>
            </div>

            <div class="flex gap-4 mt-8">
                <button onclick="closeModal()" class="flex-1 py-4 font-bold text-gray-400">Hủy</button>
                <button onclick="saveNote()" class="flex-[2] bg-emerald-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg hover:bg-emerald-700 transition-all">Ghim Lên Canvas</button>
            </div>
        </div>
    </div>

    <script>
        let scale = 0.8, posX = window.innerWidth/2 - 4000*0.8, posY = window.innerHeight/2 - 4000*0.8;
        let selectedTheme = 'mint';
        let isPanning = false, startX, startY;
        
        const viewport = document.getElementById('canvas-viewport');
        const content = document.getElementById('canvas-content');
        const zoomSlider = document.getElementById('zoom-slider');
        const zoomPercent = document.getElementById('zoom-percent');

        // --- Authentication ---
        function switchAuth(type) {
            document.getElementById('signin-card').classList.toggle('auth-hidden', type === 'signup');
            document.getElementById('signup-card').classList.toggle('auth-hidden', type === 'signin');
        }

        function handleAuth(mode) {
            const nameInput = document.getElementById(mode === 'login' ? 'login-email' : 'signup-name');
            const name = nameInput.value || "Người dùng";
            document.getElementById('user-name-display').innerText = name;
            document.getElementById('user-avatar').innerText = name[0].toUpperCase();
            document.getElementById('auth-container').classList.add('auth-hidden');
            document.getElementById('toggle-sidebar').classList.remove('hidden');
            setTimeout(() => toggleSidebar(), 600);
        }

        // --- UI UI ---
        function toggleSidebar() { document.getElementById('app-sidebar').classList.toggle('collapsed'); }
        function openModal() { document.getElementById('note-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('note-modal').classList.add('hidden'); }
        
        function selectTheme(theme) {
            selectedTheme = theme;
            document.querySelectorAll('#theme-picker button').forEach(btn => {
                btn.classList.toggle('scale-125', btn.dataset.theme === theme);
            });
        }

        // --- Canvas Engine ---
        viewport.addEventListener('mousedown', e => {
            if(e.target === viewport || e.target === content) {
                isPanning = true; startX = e.clientX - posX; startY = e.clientY - posY;
            }
        });
        window.addEventListener('mousemove', e => {
            if(isPanning) { posX = e.clientX - startX; posY = e.clientY - startY; updateTransform(); }
        });
        window.addEventListener('mouseup', () => isPanning = false);

        viewport.addEventListener('wheel', e => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            applyZoom(scale * delta, e.clientX, e.clientY);
        }, { passive: false });

        function applyZoom(newScale, centerX, centerY) {
            newScale = Math.min(Math.max(0.1, newScale), 2.5);
            const rect = viewport.getBoundingClientRect();
            posX = (centerX - rect.left) - ((centerX - rect.left) - posX) * (newScale / scale);
            posY = (centerY - rect.top) - ((centerY - rect.top) - posY) * (newScale / scale);
            scale = newScale;
            updateTransform();
            zoomSlider.value = scale;
            zoomPercent.innerText = Math.round(scale * 100) + '%';
        }

        function handleZoomSlider(val) { applyZoom(parseFloat(val), window.innerWidth/2, window.innerHeight/2); }
        function zoomStep(step) { applyZoom(scale + step, window.innerWidth/2, window.innerHeight/2); }

        function updateTransform() { content.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }
        function resetView() { applyZoom(0.8, window.innerWidth/2, window.innerHeight/2); }

        // --- Themes ---
        function changeCanvasTheme(theme) {
            document.querySelectorAll('.bg-layer').forEach(l => { l.style.display = 'none'; l.innerHTML = ''; });
            document.body.style.background = '#f8fafc';
            
            if(theme === 'pink') {
                const l = document.getElementById('hearts-layer'); l.style.display = 'block';
                for(let i=0; i<15; i++) createFloating(l, '💖');
            } else if(theme === 'stars') {
                document.getElementById('stars-layer').style.display = 'block';
            } else if(theme === 'football') {
                const l = document.getElementById('football-layer'); l.style.display = 'block';
                for(let i=0; i<12; i++) createFloating(l, '⚽');
            }
        }
        function createFloating(p, e) {
            const i = document.createElement('div'); i.className = 'floating-emoji';
            i.innerText = e; i.style.left = Math.random()*100 + '%';
            i.style.animationDelay = Math.random()*5 + 's';
            i.style.fontSize = (20 + Math.random()*20) + 'px';
            p.appendChild(i);
        }

        function toggleGrid(cb) {
            viewport.style.backgroundImage = cb.checked ? 'radial-gradient(rgba(0,0,0,0.06) 1.5px, transparent 1.5px)' : 'none';
        }

        // --- Note Engine ---
        function saveNote() {
            const title = document.getElementById('note-title').value || "Ghi chú";
            const text = document.getElementById('note-body').value || "";
            const font = document.getElementById('font-select').value;

            const note = document.createElement('div');
            note.className = `note-card theme-${selectedTheme}`;
            note.style.fontFamily = font;
            
            const vCX = (-posX + window.innerWidth/2) / scale;
            const vCY = (-posY + window.innerHeight/2) / scale;
            note.style.left = `${vCX - 110}px`;
            note.style.top = `${vCY - 80}px`;

            note.innerHTML = `
                <div class="note-header">
                    <span class="text-[8px] font-black uppercase opacity-30">Note</span>
                    <button class="text-gray-400 hover:text-red-500" onclick="this.closest('.note-card').remove()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6 6 18M6 6l12 12"/></svg>
                    </button>
                </div>
                <div class="note-body">
                    <h3 class="text-lg font-black mb-1">${title}</h3>
                    <p class="text-sm opacity-90 whitespace-pre-wrap">${text}</p>
                </div>
                <div class="resizer"></div>
            `;

            content.appendChild(note);
            attachDragAndResize(note);
            closeModal();
            
            document.getElementById('note-title').value = '';
            document.getElementById('note-body').value = '';
        }

        function attachDragAndResize(el) {
            const header = el.querySelector('.note-header');
            const resizer = el.querySelector('.resizer');
            let isDragging = false, isResizing = false;
            let startX, startY, startW, startH, offsetX, offsetY;

            // Kéo thẻ
            header.addEventListener('mousedown', e => {
                e.preventDefault(); e.stopPropagation();
                isDragging = true;
                offsetX = e.clientX/scale - el.offsetLeft;
                offsetY = e.clientY/scale - el.offsetTop;
                el.style.zIndex = 1000;
                document.querySelectorAll('.note-card').forEach(c => { if(c!==el) c.style.zIndex = 10; });
            });

            // Thay đổi kích thước
            resizer.addEventListener('mousedown', e => {
                e.preventDefault(); e.stopPropagation();
                isResizing = true;
                startX = e.clientX; startY = e.clientY;
                startW = el.offsetWidth; startH = el.offsetHeight;
            });

            window.addEventListener('mousemove', e => {
                if(isDragging) {
                    el.style.left = (e.clientX/scale - offsetX) + 'px';
                    el.style.top = (e.clientY/scale - offsetY) + 'px';
                }
                if(isResizing) {
                    const dw = (e.clientX - startX) / scale;
                    const dh = (e.clientY - startY) / scale;
                    el.style.width = (startW + dw) + 'px';
                    el.style.height = (startH + dh) + 'px';
                }
            });

            window.addEventListener('mouseup', () => { isDragging = false; isResizing = false; });
        }

        resetView();
    </script>
</body>
</html>
